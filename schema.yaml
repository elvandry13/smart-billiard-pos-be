      - access
      - refresh
    TypeEnum:
      enum:
      - percentage
      - fixed
      type: string
      description: |-
        * `percentage` - Percentage
        * `fixed` - Fixed
    UserCreate:
      type: object
      description: Serializer untuk membuat user baru (oleh Admin/Super Admin).
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          maxLength: 50
        email:
          type: string
          format: email
          maxLength: 254
        phone:
          type: string
          maxLength: 20
        role:
          $ref: '#/components/schemas/RoleEnum'
        password:
          type: string
          writeOnly: true
        tenant:
          type: integer
          nullable: true
        outlet:
          type: integer
          nullable: true
      required:
      - id
      - password
      - username
    UserList:
      type: object
      description: Serializer ringkas untuk list user.
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          maxLength: 50
        role:
          $ref: '#/components/schemas/RoleEnum'
        is_active:
          type: boolean
        date_joined:
          type: string
          format: date-time
      required:
      - id
      - username
    UserProfile:
      type: object
      description: Serializer untuk profile user yang sedang login.
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          readOnly: true
        email:
          type: string
          format: email
          maxLength: 254
        phone:
          type: string
          maxLength: 20
        role:
          allOf:
          - $ref: '#/components/schemas/RoleEnum'
          readOnly: true
        tenant_name:
          type: string
          readOnly: true
        outlet_name:
          type: string
          readOnly: true
        is_active:
          type: boolean
          readOnly: true
        date_joined:
          type: string
          format: date-time
          readOnly: true
      required:
      - date_joined
      - id
      - is_active
      - outlet_name
      - role
      - tenant_name
      - username
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
