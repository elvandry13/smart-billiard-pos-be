components:
  schemas:
    AdditionalFee:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        outlet:
          type: integer
        name:
          type: string
          maxLength: 100
        type:
          $ref: '#/components/schemas/TypeEnum'
        value:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        apply_to:
          type: string
          maxLength: 50
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - name
      - outlet
      - type
      - updated_at
      - value
    ChangePassword:
      type: object
      description: Serializer untuk ganti password.
      properties:
        old_password:
          type: string
          writeOnly: true
        new_password:
          type: string
          writeOnly: true
      required:
      - new_password
      - old_password
    DayTypeEnum:
      enum:
      - weekday
      - weekend
      - specific_day
      type: string
      description: |-
        * `weekday` - Weekday
        * `weekend` - Weekend
        * `specific_day` - Specific Day
    Login:
      type: object
      description: Serializer untuk login — menerima username & password, return JWT
        token.
      properties:
        username:
          type: string
        password:
          type: string
          writeOnly: true
      required:
      - password
      - username
    Outlet:
      type: object
      description: Serializer untuk Outlet CRUD.
      properties:
        id:
          type: integer
          readOnly: true
        tenant:
          type: integer
        tenant_name:
          type: string
          readOnly: true
        name:
          type: string
          maxLength: 100
        code:
          type: string
          maxLength: 20
        address:
          type: string
        timezone:
          type: string
          maxLength: 50
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - code
      - created_at
      - id
      - name
      - tenant
      - tenant_name
    PaginatedAdditionalFeeList:
      type: object
      properties:
        count:
          type: integer
          example: 123
        next:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=4
        previous:
          type: string
          nullable: true
          format: uri
          example: http://api.example.org/accounts/?page=2
        results:
          type: array
          items:
            $ref: '#/components/schemas/AdditionalFee'
