components:
  schemas:
    AdditionalFee:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        outlet:
          type: integer
        name:
          type: string
          maxLength: 100
        type:
          $ref: '#/components/schemas/AdditionalFeeTypeEnum'
        value:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        apply_to:
          type: string
          maxLength: 50
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - id
      - name
      - outlet
      - type
      - updated_at
      - value
    AdditionalFeeRequest:
      type: object
      properties:
        outlet:
          type: integer
        name:
          type: string
          minLength: 1
          maxLength: 100
        type:
          $ref: '#/components/schemas/AdditionalFeeTypeEnum'
        value:
          type: string
          format: decimal
          pattern: ^-?\d{0,8}(?:\.\d{0,2})?$
        apply_to:
          type: string
          minLength: 1
          maxLength: 50
        is_active:
          type: boolean
      required:
      - name
      - outlet
      - type
      - value
    AdditionalFeeTypeEnum:
      enum:
      - percentage
      - fixed
      type: string
      description: |-
        * `percentage` - Percentage
        * `fixed` - Fixed
    AuditLog:
      type: object
      description: Serializer read-only untuk AuditLog.
      properties:
        id:
          type: integer
          readOnly: true
        user:
          type: integer
          readOnly: true
          nullable: true
        user_name:
          type: string
          nullable: true
          readOnly: true
        outlet:
          type: integer
          readOnly: true
          nullable: true
        outlet_name:
          type: string
          nullable: true
          readOnly: true
        action:
          type: string
          readOnly: true
        object_type:
          type: string
          readOnly: true
        object_id:
          type: integer
          readOnly: true
          nullable: true
        changes:
          readOnly: true
        notes:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - action
      - changes
      - created_at
      - id
      - notes
      - object_id
      - object_type
      - outlet
      - outlet_name
      - user
      - user_name
    ChangePasswordRequest:
      type: object
      description: Serializer untuk ganti password.
      properties:
        old_password:
          type: string
          writeOnly: true
          minLength: 1
        new_password:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - new_password
      - old_password
    CreatePayment:
      type: object
      description: Serializer untuk input create payment.
      properties:
        session_id:
          type: integer
        method:
          allOf:
          - $ref: '#/components/schemas/MethodEnum'
          default: cash
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        gateway_reference:
          type: string
          default: ''
          maxLength: 255
      required:
      - amount
      - session_id
    CreatePaymentRequest:
      type: object
      description: Serializer untuk input create payment.
      properties:
        session_id:
          type: integer
        method:
          allOf:
          - $ref: '#/components/schemas/MethodEnum'
          default: cash
        amount:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        gateway_reference:
          type: string
          default: ''
          maxLength: 255
      required:
      - amount
      - session_id
    DayTypeEnum:
      enum:
      - weekday
      - weekend
      - specific_day
      type: string
      description: |-
        * `weekday` - Weekday
        * `weekend` - Weekend
        * `specific_day` - Specific Day
    GenerateReceipt:
      type: object
      description: Request serializer untuk generate receipt.
      properties:
        session_id:
          type: integer
      required:
      - session_id
    GenerateReceiptRequest:
      type: object
      description: Request serializer untuk generate receipt.
      properties:
        session_id:
          type: integer
      required:
      - session_id
    Login:
      type: object
      description: Serializer untuk login — menerima username & password, return JWT
        token.
      properties:
        username:
          type: string
      required:
      - username
    LoginRequest:
      type: object
      description: Serializer untuk login — menerima username & password, return JWT
        token.
      properties:
        username:
          type: string
          minLength: 1
        password:
          type: string
          writeOnly: true
          minLength: 1
      required:
      - password
      - username
    MethodEnum:
      enum:
