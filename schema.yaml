    get:
      operationId: additional_fees_list
      description: Base ViewSet that auto-scopes queryset to user's outlet (non-SuperAdmin).
      parameters:
      - in: query
        name: is_active
        schema:
          type: boolean
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: type
        schema:
          type: string
          enum:
          - fixed
          - percentage
        description: |-
          * `percentage` - Percentage
          * `fixed` - Fixed
      tags:
      - additional-fees
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAdditionalFeeList'
          description: ''
    post:
